name: reelify
description: RAY - AI Short Video Viewer App - TikTok Style
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3
  google_sign_in: ^6.2.1

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Video Player
  video_player: ^2.9.1
  chewie: ^1.8.5

  # Image & Cache
  cached_network_image: ^3.4.1

  # Local DB
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Animations
  lottie: ^3.1.2

  # QR Scanner
  mobile_scanner: ^5.2.3

  # Voice Assistant
  speech_to_text: ^7.0.0
  flutter_tts: ^4.1.0

  # Image Picker (upload)
  image_picker: ^1.1.2
  file_picker: ^8.1.2

  # Utils
  intl: ^0.20.0
  uuid: ^4.4.2
  shared_preferences: ^2.3.2
  connectivity_plus: ^6.0.5
  permission_handler: ^11.3.1
  timeago: ^3.7.0
  share_plus: ^10.0.2
  url_launcher: ^6.3.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

  # Icons / Fonts
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.7.0

  # HTTP (for AI API)
  http: ^1.2.2
  dio: ^5.7.0
  cloudinary_url_gen: ^1.8.0
  cloudinary_flutter: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.12

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
    - assets/models/


